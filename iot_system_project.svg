  <line x1="250" y1="160" x2="205" y2="160" stroke="#1e3a8a" stroke-width="2"></line>
  <line x1="160" y1="250" x2="160" y2="205" stroke="#1e3a8a" stroke-width="2"></line>
  <line x1="70" y1="160" x2="115" y2="160" stroke="#1e3a8a" stroke-width="2"></line>

  <!-- Signal Propagation Arcs -->
  <path d="M120 120 A60 60 0 0 1 200 120" fill="none" stroke="#64748b" stroke-width="2"></path>
  <path d="M120 200 A60 60 0 0 0 200 200" fill="none" stroke="#64748b" stroke-width="2"></path>

