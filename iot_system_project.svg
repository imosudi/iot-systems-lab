  <circle cx="260" cy="160" r="8" fill="#0f172a"></circle>
  <circle cx="160" cy="260" r="8" fill="#0f172a"></circle>
  <circle cx="60" cy="160" r="8" fill="#0f172a"></circle>

  <!-- Communication Links -->
