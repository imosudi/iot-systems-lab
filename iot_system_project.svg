  <line x1="40" y1="160" x2="280" y2="160" stroke="#cbd5e1" stroke-width="1"></line>

  <!-- Central Hexagon (Structured Systems Engineering) -->
  <polygon points="
      160,105
      205,132
      205,188
      160,215
      115,188
      115,132" fill="#1e3a8a"></polygon>

  <!-- Central Core Node -->
