version: "3.9"

services:
  ble:
    build: ble_engine
    restart: unless-stopped
    container_name: ble
    privileged: true
    environment:
      TZ: Europe/Vienna
    volumes:
      - /run/dbus:/run/dbus:rw,Z
    

  mosquitto:
    build: mosquitto
    container_name: mosquitto
    restart: unless-stopped
    environment:
      TZ: Europe/Vienna
    ports:
      - "8883:8883"
    volumes:
      - ./iot_storage/mosquitto-data-storage:/mosquitto/data:Z
      - ./iot_storage/mosquitto-log-storage:/mosquitto/log:Z
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:Z

  client:
    build: client
    container_name: client
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_started

  influxdb:
    image: docker.io/library/influxdb:latest
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - TZ=Europe/Vienna
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=org1
      - DOCKER_INFLUXDB_INIT_BUCKET=bucket1


  backend:
    build:
      context: backend
      args:
        - DOCKERHUB_TAG=latest
    container_name: backend
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - ./iot_storage/nodered-storage:/data:Z
    environment:
      - TZ=Europe/Vienna
    depends_on:
      mosquitto:
        condition: service_started
      influxdb:
        condition: service_started

  grafana:
    image: docker.io/grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - TZ=Europe/Vienna
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
    volumes:
      - ./iot_storage/grafana-storage:/var/lib/grafana:Z
      - ./iot_storage/grafana-provisioning/:/etc/grafana/provisioning
      - ./iot_storage/grafana-dashboards/:/etc/grafana/dashboards
    depends_on:
      influxdb:
        condition: service_started
  

