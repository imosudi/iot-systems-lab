version: "3.9"

services:
  ble:
    build: ble_engine
    container_name: ble
    privileged: true
    volumes:
      - /run/dbus:/run/dbus:rw,Z
  mosquitto:
    build: mosquitto
    container_name: mosquitto
    restart: unless-stopped
    environment:
      TZ: Europe/Vienna
    ports:
      - "8883:8883"
    volumes:
      - ./iot_storage/mosquitto-data-storage:/mosquitto/data:Z
      - ./iot_storage/mosquitto-log-storage:/mosquitto/log:Z
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:Z

  client:
    build: client
    container_name: client
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_started
  
  influxdb:
    image: docker.io/library/influxdb:2.8
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      TZ: Europe/Vienna
  backend:
    build:
      context: backend
      args:
        - DOCKERHUB_TAG=latest
    container_name: backend
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - ./iot_storage/nodered-storage:/data:Z
    environment:
      - TZ=Europe/Vienna
    depends_on:
      mosquitto:
        condition: service_started
      influxdb:
        condition: service_started